<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Pi Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 8px; background: #000; border: 1px solid #444; margin-bottom: 15px; }
        .controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #3d3d3d; color: white; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { font-size: 0.9em; color: #aaa; margin-bottom: 10px; }
        .log-box { height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.8em; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 WebRTC Video Viewer</h2>
    <div id="status">Status: Connecting to MQTT...</div>
    
    <video id="remoteVideo" autoplay playsinline></video>

    <div class="controls">
        <input type="text" id="targetId" placeholder="Enter Camera ID (e.g. peer_xxxxxx)">
        <button id="callBtn" onclick="initiateCall()">Start Call</button>
    </div>

    <div class="log-box" id="logs">
        [System] Waiting for MQTT connection...<br>
    </div>
</div>

<script>
    const config = {
        host: "e5122a5328ea4986a0295fa6e037655a.s2.eu.hivemq.cloud",
        port: 8884,
        topic: "webrtc/signaling",
        username: "admin",
        password: "admin1234S"
    };

    const myId = "viewer_" + Math.random().toString(16).slice(2, 8);
    let pc = null;
    let targetPeerId = "";
    
    // Initialize MQTT Client
    const mqtt = new Paho.MQTT.Client(config.host, config.port, myId);

    mqtt.onConnectionLost = (response) => {
        log("⚠️ Connection Lost: " + response.errorMessage);
        document.getElementById('status').innerText = "Status: Disconnected";
    };

    mqtt.onMessageArrived = (message) => {
        const payload = JSON.parse(message.payloadString);
        
        // Auto-fill target ID if we see a presence message
        if (payload.type === "presence" && payload.from !== myId) {
            if (!document.getElementById('targetId').value) {
                document.getElementById('targetId').value = payload.from;
                log("✨ Found peer: " + payload.from);
            }
            return;
        }

        // Only process messages meant for us
        if (payload.to !== myId) return;

        log("📥 Received " + payload.type.toUpperCase());

        if (payload.type === "answer") {
            pc.setRemoteDescription(new RTCSessionDescription(payload.data));
        } else if (payload.type === "ice") {
            pc.addIceCandidate(new RTCIceCandidate(payload.data));
        }
    };

    const options = {
        useSSL: true,
        userName: config.username,
        password: config.password,
        onSuccess: () => {
            log("✅ Connected to HiveMQ");
            document.getElementById('status').innerText = "Status: Online (My ID: " + myId + ")";
            mqtt.subscribe(config.topic);
        }
    };

    mqtt.connect(options);

    async function initiateCall() {
        targetPeerId = document.getElementById('targetId').value.strip();
        if (!targetPeerId) return alert("Please enter or select a Target Peer ID");

        log("🚀 Starting WebRTC Offer...");
        
        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        // Handle remote stream
        pc.ontrack = (event) => {
            log("📹 Remote track received!");
            document.getElementById('remoteVideo').srcObject = event.streams[0];
        };

        // Handle ICE candidates
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal("ice", event.candidate);
            }
        };

        // Create a DataChannel (required for some browser handshake logic)
        pc.createDataChannel("chat");

        const offer = await pc.createOffer({ offerToReceiveVideo: true });
        await pc.setLocalDescription(offer);

        sendSignal("offer", { sdp: offer.sdp, type: offer.type });
    }

    function sendSignal(type, data) {
        const payload = JSON.stringify({
            type: type,
            from: myId,
            to: targetPeerId,
            data: data
        });
        const message = new Paho.MQTT.Message(payload);
        message.destinationName = config.topic;
        mqtt.send(message);
        log("📤 Sent " + type.toUpperCase());
    }

    function log(msg) {
        const div = document.getElementById('logs');
        div.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        div.scrollTop = div.scrollHeight;
    }

    // Helper for whitespace
    String.prototype.strip = function() { return this.replace(/^\s+|\s+$/g, ''); };

</script>
</body>
</html>
